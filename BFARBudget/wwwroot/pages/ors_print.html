<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORS Print — BFAR E-Budget</title>
  <link rel="stylesheet" href="ors_print.css" />
</head>
<body>

<div id="toolbar">
  <button class="tbtn tbtn-back" onclick="goBackToRecords()">← Back to Records</button>
  <span id="toolbar-title">ORS Print Preview</span>
  <button class="tbtn tbtn-print" onclick="window.print()">🖨️ Print / Save as PDF</button>
</div>

<!-- Papers are built dynamically in JS — one ORS number can span several
     printed sheets (consolidated obligations across RCs, and/or several
     account codes under one RC). See ors_print.js. -->
<div id="papers-root"></div>

<script src="ors_print.js"></script>

</body>
</html>
