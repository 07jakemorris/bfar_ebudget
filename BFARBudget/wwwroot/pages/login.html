<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFAR E-Budget — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ocean-deep:   #0a3d4a;
      --ocean-mid:    #0e5063;
      --ocean-bright: #0fb8c9;
      --ocean-light:  #e0f7fa;
      --accent:       #007b8a;
      --accent-hover: #005f6e;
      --text-dark:    #0d2d35;
      --text-mid:     #4a7a85;
      --text-muted:   #8aadb5;
      --border:       #d0eaf0;
      --white:        #ffffff;
      --radius:       12px;
    }
    html, body { height: 100%; font-family: "Segoe UI", Arial, sans-serif; background: var(--ocean-deep); }
    .login-wrapper { display: flex; min-height: 100vh; }

    /* LEFT */
    .left-panel {
      flex: 1.1;
      background: linear-gradient(160deg, #0a3d4a 0%, #0e6a7e 55%, #0fb8c9 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3rem 2.5rem; position: relative; overflow: hidden;
    }
    .left-panel::before {
      content: ""; position: absolute; bottom: -60px; left: -60px;
      width: 420px; height: 420px; border-radius: 50%;
      background: rgba(15,184,201,0.10); pointer-events: none;
    }
    .left-panel::after {
      content: ""; position: absolute; top: -80px; right: -80px;
      width: 340px; height: 340px; border-radius: 50%;
      background: rgba(255,255,255,0.05); pointer-events: none;
    }
    .agency-header { text-align: center; margin-bottom: 2.25rem; position: relative; z-index: 1; }
    .agency-header .dept {
      font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.68);
      text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 7px;
    }
    .agency-header .bureau {
      font-size: 16px; font-weight: 800; color: #fff;
      text-transform: uppercase; letter-spacing: 0.09em; line-height: 1.35; margin-bottom: 7px;
    }
    .agency-header .region {
      font-size: 11.5px; font-weight: 500; color: rgba(255,255,255,0.60);
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .agency-divider {
      width: 56px; height: 2px; background: rgba(255,255,255,0.22);
      border-radius: 999px; margin: 0 auto 2.25rem; position: relative; z-index: 1;
    }
    .logos-row {
      display: flex; align-items: center; justify-content: center;
      gap: 2rem; position: relative; z-index: 1;
    }
    .logos-row img {
      object-fit: contain;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.28));
      transition: transform 0.3s ease;
    }
    .logos-row img:hover { transform: scale(1.04); }
    .logo-bfar    { width: 130px; height: 100px; }
    .logo-ebudget { width: 140px; height: 140px; }
    .logo-sep { width: 1px; height: 76px; background: rgba(255,255,255,0.20); }
    .left-tagline {
      margin-top: 2.25rem; font-size: 11.5px;
      color: rgba(255,255,255,0.42); letter-spacing: 0.06em;
      position: relative; z-index: 1; text-align: center;
    }

    /* RIGHT */
    .right-panel {
      flex: 0.9; background: #f0f8fa;
      display: flex; align-items: center; justify-content: center;
      padding: 2.5rem 2rem;
    }
    .login-card { width: 100%; max-width: 400px; }
    .login-card-header { margin-bottom: 1.75rem; }
    .login-card-header h1 {
      font-size: 24px; font-weight: 800; color: var(--text-dark);
      margin-bottom: 4px; letter-spacing: -0.02em;
    }
    .login-card-header p { font-size: 13px; color: var(--text-mid); }

    /* ROLE TOGGLE */
    .role-toggle {
      display: flex; background: #ddeef2; border-radius: 10px;
      padding: 4px; margin-bottom: 1.75rem; gap: 4px;
    }
    .role-toggle input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .role-toggle label {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 9px 8px; border-radius: 7px; font-size: 12px; font-weight: 600;
      color: var(--text-mid); cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s; user-select: none;
    }
    .role-toggle label svg { flex-shrink: 0; width: 15px; height: 15px; }
    .role-toggle input:checked + label {
      background: var(--white); color: var(--accent);
      box-shadow: 0 2px 8px rgba(10,61,74,0.13);
    }

    /* FIELD */
    .field-group { margin-bottom: 1.1rem; }
    .field-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-mid); text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 6px;
    }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon {
      position: absolute; left: 13px;
      display: flex; align-items: center; pointer-events: none;
    }
    .input-icon svg {
      width: 17px; height: 17px; stroke: var(--ocean-bright);
      fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .input-wrap input {
      width: 100%; padding: 11px 44px; font-size: 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff; color: var(--text-dark); outline: none;
      font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap input::placeholder { color: var(--text-muted); }
    .input-wrap input:focus {
      border-color: var(--ocean-bright);
      box-shadow: 0 0 0 3px rgba(15,184,201,0.15);
    }
    .pw-toggle {
      position: absolute; right: 13px; display: flex; align-items: center;
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--text-muted); transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--accent); }
    .pw-toggle svg {
      width: 17px; height: 17px; stroke: currentColor;
      fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* BUTTON */
    .btn-login {
      width: 100%; padding: 13px; margin-top: 0.5rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--ocean-bright) 100%);
      color: #fff; border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(15,184,201,0.30);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit;
    }
    .btn-login:hover  { opacity: 0.92; box-shadow: 0 6px 20px rgba(15,184,201,0.38); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    /* ERROR */
    .alert-error {
      display: none; align-items: center; gap: 8px;
      background: #fee2e2; color: #991b1b;
      border: 1px solid #fca5a5; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; font-weight: 500; margin-bottom: 1rem;
    }
    .alert-error.show { display: flex; }

    /* ROLE BADGE */
    .role-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 1rem; font-size: 12px; color: var(--text-muted);
    }
    .role-badge strong { color: var(--accent); }

    /* FOOTER */
    .login-footer {
      text-align: center; margin-top: 2rem;
      font-size: 11px; color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .login-wrapper { flex-direction: column; }
      .left-panel { padding: 2.25rem 1.5rem; flex: none; }
      .logo-ebudget { width: 100px; height: 100px; }
      .logo-bfar    { width: 90px;  height: 70px; }
      .right-panel  { flex: none; padding: 2rem 1.25rem; }
    }
  </style>
</head>

              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="Enter your username"
                 autocomplete="username" spellcheck="false" />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="Enter your password"
                 autocomplete="current-password" />
          <button class="pw-toggle" type="button" onclick="togglePassword()" title="Show / hide password">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-off-icon" viewBox="0 0 24 24" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-login" id="btn-login" onclick="handleLogin()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </button>

      <div class="role-badge">
        Signing in as: <strong id="role-display">Budget Admin</strong>
      </div>

      <div class="login-footer">
        BFAR E-Budget System &copy; 2026 &nbsp;&middot;&nbsp; Regional Office No. 8
      </div>

    </div>
  </div>

</div>

<script>
  function togglePassword() {
    const input  = document.getElementById('password');
    const eyeOn  = document.getElementById('eye-icon');
    const eyeOff = document.getElementById('eye-off-icon');
    const hidden = input.type === 'password';
    input.type           = hidden ? 'text'  : 'password';
    eyeOn.style.display  = hidden ? 'none'  : '';
    eyeOff.style.display = hidden ? ''      : 'none';
  }

  document.querySelectorAll('input[name="role"]').forEach(r => {
    r.addEventListener('change', function () {
      document.getElementById('role-display').textContent =
        this.value === 'admin' ? 'Budget Admin' : 'Budget Staff';
    });
  });

  async function handleLogin() {
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const roleEl     = document.querySelector('input[name="role"]:checked');

    const username = usernameEl ? usernameEl.value.trim() : '';
    const password = passwordEl ? passwordEl.value        : '';
    const role     = roleEl     ? roleEl.value            : 'staff';

    const btn    = document.getElementById('btn-login');
    const errBox = document.getElementById('login-error');
    const errMsg = document.getElementById('login-error-msg');

    errBox.classList.remove('show');

    // Debug line — open browser console (F12) to see this
    console.log('Login attempt:', { username, passwordLen: password.length, role });

    if (!username || !password) {
      errMsg.textContent = `Fields missing — username: "${username}", password length: ${password.length}`;
      errBox.classList.add('show');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Signing in...';

    fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password, role })
    })
    .then(async res => {
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Invalid credentials.');
      window.location.href = '/pages/index.html';
    })
    .catch(err => {
      errMsg.textContent = err.message;
      errBox.classList.add('show');
    })
    .finally(() => {
      btn.disabled  = false;
      btn.innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
    });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
